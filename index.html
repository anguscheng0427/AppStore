<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Angus Web App Store</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- 引入 Marked.js 用於解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --primary-blue: #007aff;
            --text-main: #1c1c1e;
            --text-sub: #8e8e93;
            --shadow: 0 4px 12px rgba(0,0,0,0.06);
            --nav-height: 60px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        /* --- Navbar --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            padding-top: env(safe-area-inset-top);
            padding-left: 20px;
            padding-right: 20px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: flex-start;
            z-index: 50;
        }

        .navbar-brand { font-size: 22px; display: flex; align-items: baseline; gap: 6px; }
        .brand-name { font-weight: 800; color: var(--primary-blue); letter-spacing: -0.5px; }
        .brand-suffix { font-weight: 600; color: #000; letter-spacing: -0.3px; }

        /* --- Main Page --- */
        .page-container {
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            padding-top: calc(var(--nav-height) + env(safe-area-inset-top) + 20px);
            padding-bottom: 80px;
            -webkit-overflow-scrolling: touch;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* --- Cards --- */
        .app-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 16px;
            display: flex;
            align-items: center;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
            border: 1px solid rgba(0,0,0,0.02);
        }
        .app-card:active { transform: scale(0.98); }

        .item-icon {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            background: #f2f2f7;
            margin-right: 16px;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: var(--primary-blue);
        }
        .item-icon img { width: 100%; height: 100%; object-fit: cover; }
        
        .item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; padding-right: 10px; }
        .item-name { font-size: 17px; font-weight: 600; margin-bottom: 4px; color: var(--text-main); }
        .item-desc { font-size: 13px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .open-btn-card {
            background: #f0f0f5;
            color: var(--primary-blue);
            font-weight: 700;
            font-size: 13px;
            padding: 8px 18px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            flex-shrink: 0;
            z-index: 2;
        }
        .open-btn-card:active { background: #e1e1e6; }

        /* --- Detail View --- */
        #detail-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 100;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            overflow-y: auto; display: flex; flex-direction: column;
        }
        #detail-view.active { transform: translateY(0); }

        .detail-nav {
            position: sticky; top: 0; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 10px 16px; padding-top: max(10px, env(safe-area-inset-top));
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10; border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }
        .back-btn { color: var(--primary-blue); font-size: 17px; background: none; border: none; padding: 8px 0; cursor: pointer; font-weight: 500; display: flex; align-items: center; }
        .back-btn::before { content: '‹'; font-size: 30px; margin-right: 4px; line-height: 18px; margin-top: -4px; }

        .detail-content { padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; padding-bottom: 60px; }
        .detail-header { display: flex; gap: 20px; margin-bottom: 24px; margin-top: 10px; }
        
        .detail-icon {
            width: 110px; height: 110px; border-radius: 24px; border: 1px solid rgba(0,0,0,0.1);
            overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            font-size: 48px; font-weight: bold; color: var(--primary-blue); background: #f2f2f7;
        }
        .detail-icon img { width: 100%; height: 100%; object-fit: cover; }

        .detail-title-block { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; padding-top: 2px; }
        .detail-name { font-size: 24px; font-weight: 700; line-height: 1.2; margin-bottom: 4px; }
        
        .detail-dev { font-size: 15px; color: var(--primary-blue); font-weight: 500; margin-bottom: auto; }
        .detail-dev a { color: inherit; text-decoration: none; }
        .detail-dev a:hover { text-decoration: underline; opacity: 0.8; }

        .btn-group { display: flex; gap: 10px; margin-top: 12px; }
        .action-btn {
            background-color: var(--primary-blue); color: white; border: none;
            padding: 8px 24px; border-radius: 20px; font-size: 15px; font-weight: 600;
            cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.25); flex-grow: 1; max-width: 120px;
        }
        .share-btn {
            background-color: #f0f0f5; color: var(--primary-blue); border: none;
            width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 18px;
        }

        /* --- Screenshots --- */
        .screenshots-container { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0 20px 0; -webkit-overflow-scrolling: touch; margin-bottom: 10px; }
        .screenshots-container::-webkit-scrollbar { display: none; }
        .screenshot-item { width: 200px; height: 355px; border-radius: 12px; background: #eee; flex-shrink: 0; overflow: hidden; border: 1px solid rgba(0,0,0,0.1); }
        .screenshot-item img { width: 100%; height: 100%; object-fit: cover; }

        /* --- Markdown Styling (Enhanced) --- */
        .markdown-body { font-size: 16px; line-height: 1.6; color: #333; }
        .markdown-body h1 { margin-top: 24px; margin-bottom: 12px; font-weight: 800; color: #000; font-size: 22px; }
        .markdown-body h2 { margin-top: 20px; margin-bottom: 10px; font-weight: 700; color: #1c1c1e; font-size: 19px; }
        .markdown-body h3 { margin-top: 16px; margin-bottom: 8px; font-weight: 600; font-size: 17px; }
        .markdown-body p { margin-bottom: 16px; }
        .markdown-body ul, .markdown-body ol { padding-left: 20px; color: var(--text-sub); margin-bottom: 16px; }
        .markdown-body li { margin-bottom: 6px; }
        .markdown-body blockquote { border-left: 4px solid var(--primary-blue); margin: 0 0 16px 0; padding-left: 16px; color: var(--text-sub); background: #f9f9f9; padding: 10px 16px; border-radius: 0 8px 8px 0; }
        .markdown-body code { background: #f0f0f5; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.9em; color: #d63384; }
        .markdown-body img { max-width: 100%; border-radius: 12px; margin: 10px 0; display: block; }
        .markdown-body a { color: var(--primary-blue); text-decoration: none; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        .markdown-body th, .markdown-body td { border: 1px solid #e1e1e1; padding: 8px; text-align: left; }
        .markdown-body th { background-color: #f2f2f7; }

        .divider { height: 1px; background: #e5e5ea; margin: 24px 0; width: 100%; }

        /* --- Splash Screen (Animation) --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        #splash-screen.show { opacity: 1; pointer-events: all; }

        .splash-icon {
            width: 120px; height: 120px; border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); margin-bottom: 24px;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            font-size: 50px; color: var(--primary-blue); background: #f2f2f7;
            animation: pulse 2s infinite ease-in-out;
        }
        .splash-icon img { width: 100%; height: 100%; object-fit: cover; }
        
        .splash-name { font-size: 24px; font-weight: 700; color: #000; letter-spacing: 0.5px; }
        .splash-loading { margin-top: 10px; font-size: 14px; color: var(--text-sub); }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* --- Toast --- */
        #toast {
            visibility: hidden; min-width: 150px; margin-left: -75px;
            background-color: rgba(30, 30, 30, 0.9); color: #fff; text-align: center;
            border-radius: 50px; padding: 12px 24px; position: fixed; z-index: 200;
            left: 50%; bottom: 40px; font-size: 14px; font-weight: 500;
            opacity: 0; transform: translateY(20px); transition: opacity 0.3s, transform 0.3s;
            backdrop-filter: blur(10px);
        }
        #toast.show { visibility: visible; opacity: 1; transform: translateY(0); }
        
        /* Error Box */
        .error-box { text-align: center; padding: 40px 20px; background: #fff; border-radius: 16px; margin-top: 20px; }
        .error-tech { background: #f2f2f7; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; color: #d63031; text-align: left; word-break: break-all; }
        .loading-text { text-align: center; color: var(--text-sub); padding: 40px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">
            <span class="brand-name">Angus</span>
            <span class="brand-suffix">App Store</span>
            <span class="brand-suffix">(Preview)</span> <!--測試中-->
        </div>
    </nav>

    <!-- 主頁面 -->
    <div class="page-container" id="main-page">
        <div id="app-grid" class="app-grid">
            <div class="loading-text">Loading Apps...</div>
        </div>
    </div>

    <!-- 詳情頁面 -->
    <div id="detail-view">
        <div class="detail-nav">
            <button class="back-btn" onclick="closeDetail()">Apps</button>
        </div>
        
        <div class="detail-content">
            <div class="detail-header">
                <div id="d-icon" class="detail-icon"></div>
                <div class="detail-title-block">
                    <div id="d-name" class="detail-name">App Name</div>
                    <div id="d-dev" class="detail-dev"></div>
                    <div class="btn-group">
                        <!-- 開啟按鈕 (注意：這裡不直接寫 href，而是綁定 JS) -->
                        <button id="d-open-btn" class="action-btn">開啟</button>
                        <button class="share-btn" onclick="shareCurrentApp()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <div id="d-screenshots-area" style="display:none;">
                <h3 style="font-size:19px; font-weight:700; margin-bottom:10px;">預覽</h3>
                <div id="d-screenshots" class="screenshots-container"></div>
                <div class="divider"></div>
            </div>

            <div id="d-desc-container" class="markdown-body"></div>
        </div>
    </div>

    <!-- 啟動動畫 (Splash Screen) -->
    <div id="splash-screen">
        <div id="splash-icon" class="splash-icon"></div>
        <div id="splash-name" class="splash-name"></div>
        <div class="splash-loading">Opening...</div>
    </div>

    <!-- Toast Notification -->
    <div id="toast">連結已複製</div>

    <script>
        const APPS_SOURCE = 'apps.json';
        const DEFAULT_GITHUB = 'https://github.com/anguscheng0427';
        let allApps = [];
        let currentAppUrl = '';
        let currentAppName = '';

        async function init() {
            const gridContainer = document.getElementById('app-grid');
            try {
                const res = await fetch(APPS_SOURCE);
                if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
                allApps = await res.json();
                
                gridContainer.innerHTML = '';
                allApps.forEach((app, index) => {
                    gridContainer.appendChild(createCard(app, index));
                });
            } catch (e) {
                gridContainer.innerHTML = `
                    <div class="error-box">
                        <div style="font-size:60px; margin-bottom:10px;">🫠</div>
                        <div style="font-size:20px; font-weight:bold; margin-bottom:8px;">哎呀！讀取失敗了</div>
                        <div style="color:#8e8e93; margin-bottom:20px; font-size:15px;">看起來有些線路秀逗了。不過別擔心，這不是你的問題！</div>
                        <div style="text-align:left; margin-bottom:5px; font-size:12px; color:#999;">給 Angus 的工程訊息:</div>
                        <div class="error-tech">${e.message}<br>請確認 apps.json 格式是否正確。</div>
                    </div>
                `;
            }
        }

        function createCard(app, index) {
            const div = document.createElement('div');
            div.className = 'app-card';
            div.onclick = () => openDetail(index);

            const iconHtml = getIconHtml(app.icon, app.name);
            const subtitle = app.description || 'Web App';

            div.innerHTML = `
                <div class="item-icon">${iconHtml}</div>
                <div class="item-info">
                    <div class="item-name">${app.name}</div>
                    <div class="item-desc">${subtitle}</div>
                </div>
                <button class="open-btn-card" onclick="launchApp(event, ${index})">開啟</button>
            `;
            return div;
        }

        // 啟動 App 的核心邏輯 (含動畫)
        function launchApp(event, index) {
            if(event) event.stopPropagation(); // 阻止冒泡
            
            const app = allApps[index];
            const splash = document.getElementById('splash-screen');
            const splashIcon = document.getElementById('splash-icon');
            const splashName = document.getElementById('splash-name');

            // 1. 設定 Splash 內容
            splashIcon.innerHTML = getIconHtml(app.icon, app.name);
            splashName.innerText = app.name;

            // 2. 顯示 Splash
            splash.classList.add('show');

            // 3. 延遲後開啟 App
            setTimeout(() => {
                window.open(app.url, '_blank');
                
                // 4. 恢復原狀 (稍微再延遲一點點消失，讓體驗更順)
                setTimeout(() => {
                    splash.classList.remove('show');
                }, 500);
            }, 800); // 這裡設定動畫停留時間 (0.8秒)
        }

        async function openDetail(index) {
            const app = allApps[index];
            const view = document.getElementById('detail-view');
            
            currentAppUrl = app.url;
            currentAppName = app.name;

            // 1. Basic Info
            document.getElementById('d-icon').innerHTML = getIconHtml(app.icon, app.name);
            document.getElementById('d-name').innerText = app.name;
            
            const devName = app.developer || 'Angus';
            const devUrl = app.developerUrl || DEFAULT_GITHUB;
            document.getElementById('d-dev').innerHTML = `<a href="${devUrl}" target="_blank">${devName}</a>`;
            
            // 綁定詳情頁的大按鈕到 launchApp
            const openBtn = document.getElementById('d-open-btn');
            openBtn.onclick = () => launchApp(null, index);

            // 2. Screenshots
            const shotArea = document.getElementById('d-screenshots-area');
            const shotContainer = document.getElementById('d-screenshots');
            if (app.screenshots && app.screenshots.length > 0) {
                shotArea.style.display = 'block';
                shotContainer.innerHTML = app.screenshots.map(url => `
                    <div class="screenshot-item"><img src="${url}" loading="lazy" alt="preview"></div>
                `).join('');
            } else {
                shotArea.style.display = 'none';
            }

            // 3. Description (Markdown)
            const contentContainer = document.getElementById('d-desc-container');
            contentContainer.innerHTML = '<div style="color:#999">Loading details...</div>';

            view.classList.add('active');
            document.body.style.overflow = 'hidden';
            window.history.pushState({detail: true}, "");

            let finalContent = '';
            if (app.introductionUrl) {
                try {
                    const res = await fetch(app.introductionUrl);
                    if (res.ok) {
                        const mdText = await res.text();
                        // 使用 Marked.js 解析
                        finalContent = marked.parse(mdText);
                    } else { throw new Error("MD fetch failed"); }
                } catch (e) {
                    finalContent = `<p>${app.description || 'No detailed introduction.'}</p>`;
                }
            } else {
                finalContent = `<p>${app.description || 'No detailed introduction.'}</p>`;
            }
            contentContainer.innerHTML = finalContent;
        }

        // Helper: 產生 Icon HTML
        function getIconHtml(iconUrl, name) {
            return iconUrl 
                ? `<img src="${iconUrl}" onerror="this.parentElement.innerHTML='${name[0]}'">`
                : `${name[0]}`;
        }

        async function shareCurrentApp() {
            if (navigator.share) {
                try {
                    await navigator.share({ title: currentAppName, text: `Check out ${currentAppName} on Angus Store!`, url: currentAppUrl });
                } catch (err) { console.log('Share canceled'); }
            } else {
                try {
                    await navigator.clipboard.writeText(currentAppUrl);
                    showToast("連結已複製");
                } catch (err) { showToast("複製失敗"); }
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 2500);
        }

        function closeDetail() {
            const view = document.getElementById('detail-view');
            view.classList.remove('active');
            document.body.style.overflow = '';
        }

        window.onpopstate = function(event) {
            const view = document.getElementById('detail-view');
            if (view.classList.contains('active')) { view.classList.remove('active'); }
        };

        init();
    </script>
</body>
</html>
